--- #################### 数据库相关配置 ####################
spring:
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 5
        min-idle: 10
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 600000
        max-evictable-idle-time-millis: 1800000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
      primary: master
      datasource:
        master:
          url: jdbc:mysql://mysql.sqlpub.com:3306/fortrue100?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: fortrue100
          password: yMoWAEdq10aPn7Ko
        slave:
          lazy: true
          url: jdbc:mysql://mysql.sqlpub.com:3306/fortrue100?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
          username: fortrue100
          password: yMoWAEdq10aPn7Ko

  redis:
    host: 127.0.0.1
    port: 6379
    database: 0

--- #################### 微信公众号/小程序配置 ####################
wx:
  mp:
    app-id: wx_test_app_id
    secret: wx_test_secret
    token: wx_test_token
    aes-key: wx_test_aes_key

--- #################### XXL-Job 定时任务配置 ####################
xxl:
  job:
    enabled: false
    admin:
      addresses: http://127.0.0.1:9090/xxl-job-admin
    executor:
      appname: yudao-module-system-server
      ip:
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30

--- #################### 多租户配置 ####################
yudao:
  tenant:
    enable: true
    ignore-urls:
      - /admin-api/system/auth/**
  captcha:
    enable: false  # 关闭验证码
